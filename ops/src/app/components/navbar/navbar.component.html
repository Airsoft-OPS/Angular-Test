<nav class="navbar">
  <div class="nav-inner">
    <!-- Logo -->
    <a routerLink="/" class="nav-logo">
      <div class="logo-icon">
        <lucide-icon
          name="crosshair"
          [size]="18"
          color="rgb(34,197,94)"
        ></lucide-icon>
      </div>
      <span class="logo-text">OPS</span>
    </a>

    <!-- Nav links -->
    <ul class="nav-links">
      <li>
        <a
          routerLink="/"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          >Home</a
        >
      </li>
      <li><a routerLink="/eventos" routerLinkActive="active">Eventos</a></li>
      <li><a routerLink="/about" routerLinkActive="active">About</a></li>
    </ul>

    <!-- Auth area -->
    <div class="nav-auth">
      @if (supabase.currentUser()) {
        <div class="user-info">
          <div class="user-avatar">
            {{ supabase.currentUser()!.email![0].toUpperCase() }}
          </div>
          <span class="user-email">{{ supabase.currentUser()!.email }}</span>
          <button class="btn-logout" (click)="logout()">Sair</button>
        </div>
      } @else {
        <button class="btn-login" (click)="openModal()">
          Login / Registar
        </button>
      }
    </div>
  </div>
</nav>

@if (showModal()) {
  <app-auth-modal (close)="closeModal()"></app-auth-modal>
}
